services:
  gateway:
    build: .
    ports:
      - "18789:18789"
      - "18790:18790"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - DATABASE_URL=postgresql://clara:clara@postgres:5432/clara
      - CLARA_GATEWAY_HOST=0.0.0.0
      - CLARA_GATEWAY_PORT=18789
      - CLARA_GATEWAY_API_PORT=18790
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      # Required: set these in .env or pass directly
      # - LLM_PROVIDER=anthropic
      # - ANTHROPIC_API_KEY=
      # - OPENAI_API_KEY=
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: clara
      POSTGRES_PASSWORD: clara
      POSTGRES_DB: clara
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clara"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrantdata:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"

volumes:
  pgdata:
  qdrantdata:
