services:
  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "18789:18789"
      - "18790:18790"
    environment:
      - ConnectionStrings__Clara=Host=postgres;Database=clara;Username=clara;Password=clara
      - Clara__Gateway__Host=0.0.0.0
    volumes:
      - ./workspace:/app/workspace
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: clara
      POSTGRES_PASSWORD: clara
      POSTGRES_DB: clara
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clara"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage

volumes:
  pgdata:
  redisdata:
  qdrantdata:
